model_list:
  # Claude lineup. Client-facing names use Anthropic's dash convention;
  # they're translated to Copilot's dot-form on the wire.
  - model_name: claude-opus-4-7
    litellm_params:
      model: github_copilot/claude-opus-4.7
  - model_name: claude-opus-4-6
    litellm_params:
      model: github_copilot/claude-opus-4.6
  - model_name: claude-opus-4-5
    litellm_params:
      model: github_copilot/claude-opus-4.5
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: github_copilot/claude-sonnet-4.5
  - model_name: claude-haiku-4-5
    litellm_params:
      model: github_copilot/claude-haiku-4.5

  # GPT fallbacks
  - model_name: gpt-5
    litellm_params:
      model: github_copilot/gpt-5.4
  - model_name: gpt-5-mini
    litellm_params:
      model: github_copilot/gpt-5-mini
  - model_name: gpt-4.1
    litellm_params:
      model: github_copilot/gpt-4.1

litellm_settings:
  drop_params: true
  disable_copilot_system_to_assistant: true
